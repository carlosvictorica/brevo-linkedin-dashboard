<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brevo — LinkedIn Campaign Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:0.5px solid #e0dfd8;padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:600;color:#1a1a1a;letter-spacing:-.02em}
.logo span{color:#0066ff}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.up-btn{border:0.5px solid #c8c7c0;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;background:#fff;color:#1a1a1a;display:flex;align-items:center;gap:6px;transition:background .12s}
.up-btn:hover{background:#f5f5f3}
.period-chip{font-size:11px;color:#1a1a1a;background:#f5f5f3;padding:4px 10px;border-radius:20px;font-weight:500;border:0.5px solid #e0dfd8}
.updated-chip{font-size:11px;color:#1D9E75;background:#d0f0e430;padding:4px 10px;border-radius:20px;border:0.5px solid #1D9E7530}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:#888780}
.empty-icon{font-size:48px;opacity:.4}
.empty-title{font-size:18px;font-weight:600;color:#5f5e5a}
.empty-sub{font-size:13px;color:#888780;text-align:center;max-width:360px;line-height:1.5}
.empty-btn{border:0.5px solid transparent;border-radius:10px;padding:10px 20px;font-size:13px;cursor:pointer;background:#1a1a1a;color:#fff;margin-top:8px}
.wrap{max-width:1100px;margin:0 auto;padding:24px}
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:0.5px solid #e0dfd8}
.tab{padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888780;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;letter-spacing:.01em}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.tab:hover{color:#444}
.filters{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.fl{font-size:11px;color:#888780;margin-right:2px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.pill{border:0.5px solid #c8c7c0;border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;background:transparent;color:#5f5e5a;transition:all .12s}
.pill.active{background:#1a1a1a;color:#fff;border-color:transparent}
.sep{width:1px;height:14px;background:#e0dfd8;margin:0 4px;flex-shrink:0}
.custom-dates{display:flex;align-items:center;gap:8px;margin-bottom:14px;background:#fff;border:0.5px solid #e0dfd8;border-radius:10px;padding:8px 14px}
.date-input{font-size:11px;padding:4px 8px;border:0.5px solid #c8c7c0;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer;outline:none}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.kpi-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kpi{background:#fff;border-radius:10px;padding:14px 16px;border:0.5px solid #e0dfd8}
.kpi-label{font-size:10px;color:#888780;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.kpi-value{font-size:22px;font-weight:600;line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.kpi-delta{font-size:11px;font-weight:500}
.dpos{color:#1D9E75}.dneg{color:#D85A30}.dneu{color:#888780}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:16px 18px;border:0.5px solid #e0dfd8;margin-bottom:12px}
.card.no-mb{margin-bottom:0}
.ct{font-size:10px;font-weight:600;color:#888780;margin-bottom:10px;letter-spacing:.05em;text-transform:uppercase}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:10px;color:#5f5e5a}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;font-weight:600;font-size:10px;color:#888780;padding:6px 10px;border-bottom:0.5px solid #e0dfd8;letter-spacing:.04em;text-transform:uppercase}
td{padding:8px 10px;border-bottom:0.5px solid #f0efe8;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.ad-row td{background:#fafaf8;border-bottom:0.5px solid #f5f5f3}
.ad-row:last-child td{border-bottom:none}
.expand-icon{display:inline-block;width:14px;font-size:9px;color:#bbb;transition:transform .15s;flex-shrink:0}
.expand-icon.open{transform:rotate(90deg)}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:.02em}
.b-uki{background:#dceefb;color:#0C447C}
.b-dach{background:#d0f0e4;color:#085041}
.b-us{background:#fde8c0;color:#633806}
.b-nordics{background:#fad8e8;color:#72243E}
.b-growth{background:#eeedfe;color:#3C3489}
.b-bull{background:#f1efe8;color:#444441}
.wow-up{color:#1D9E75;font-weight:600}
.wow-dn{color:#D85A30;font-weight:600}
.wow-neu{color:#888780}
.sec-div{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888780;margin:18px 0 10px;padding-bottom:6px;border-bottom:0.5px solid #e0dfd8}
.metric-sel{font-size:11px;padding:4px 8px;border:0.5px solid #c8c7c0;border-radius:6px;background:#fff;color:#1a1a1a;cursor:pointer}
.tab-content{display:none}
.tab-content.active{display:block}
select{outline:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Brevo <span>·</span> LinkedIn Campaigns</div>
  <div class="topbar-right">
    <span class="period-chip" id="period-chip">No data</span>
    <span class="updated-chip" id="updated-chip" style="display:none"></span>
    <button class="up-btn" onclick="document.getElementById('csv-file').click()">↑ Load LinkedIn CSV</button>
    <input type="file" id="csv-file" accept=".csv" style="display:none" onchange="handleCSV(event)">
  </div>
</div>

<div class="wrap" id="main-wrap">

  <div id="empty-state" class="empty-state" style="display:none">
    <div class="empty-icon">📊</div>
    <div class="empty-title">No campaign data yet</div>
    <div class="empty-sub">Upload your LinkedIn Ad Set Performance CSV export to populate the dashboard. Once loaded, it persists here — just reload each Monday with the new export.</div>
    <button class="empty-btn" onclick="document.getElementById('csv-file').click()">↑ Load LinkedIn CSV export</button>
  </div>

  <div id="dashboard" style="display:none">
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab" onclick="switchTab('awareness',this)">Awareness</button>
      <button class="tab" onclick="switchTab('engagement',this)">Engagement</button>
      <button class="tab" onclick="switchTab('leadgen',this)">Lead Gen</button>
      <button class="tab" onclick="switchTab('traffic',this)">Traffic</button>
    </div>

    <!-- Filter row 1: Market + Owner -->
    <div class="filters">
      <span class="fl">Market</span>
      <button class="pill active" onclick="setFilter('market','all',this)">All</button>
      <button class="pill" onclick="setFilter('market','uki',this)">UKI</button>
      <button class="pill" onclick="setFilter('market','dach',this)">DACH</button>
      <button class="pill" onclick="setFilter('market','us',this)">US</button>
      <button class="pill" onclick="setFilter('market','nordics',this)">Nordics</button>
      <div class="sep"></div>
      <span class="fl">Owner</span>
      <button class="pill active" onclick="setFilter('owner','all',this)">All</button>
      <button class="pill" onclick="setFilter('owner','growth',this)">Growth PPC</button>
      <button class="pill" onclick="setFilter('owner','bulldozer',this)">Bulldozer</button>
      <div class="sep"></div>
      <span class="fl">Period</span>
      <button class="pill active" id="period-week"   onclick="setPeriod('week',this)">This week</button>
      <button class="pill"        id="period-month"  onclick="setPeriod('month',this)">This month</button>
      <button class="pill"        id="period-3m"     onclick="setPeriod('3m',this)">Last 3M</button>
      <button class="pill"        id="period-all"    onclick="setPeriod('all',this)">All time</button>
      <button class="pill"        id="period-custom" onclick="setPeriod('custom',this)">Custom…</button>
    </div>

    <!-- Custom date row (shown only when Custom is active) -->
    <div class="custom-dates" id="custom-date-row" style="display:none">
      <span class="fl">From</span>
      <input type="date" id="date-start" class="date-input" onchange="updateCustomDates()">
      <span class="fl" style="margin-left:6px">To</span>
      <input type="date" id="date-end"   class="date-input" onchange="updateCustomDates()">
    </div>

    <div id="tab-overview"    class="tab-content active"></div>
    <div id="tab-awareness"   class="tab-content"></div>
    <div id="tab-engagement"  class="tab-content"></div>
    <div id="tab-leadgen"     class="tab-content"></div>
    <div id="tab-traffic"     class="tab-content"></div>
  </div>
</div>

<script>
// ─── Palette & labels ────────────────────────────────────────────────────────
const MKTCOLORS={uki:'#378ADD',dach:'#1D9E75',us:'#EF9F27',nordics:'#D4537E',other:'#888780'};
const OBJCOLORS={awareness:'#7F77DD',engagement:'#378ADD',leadgen:'#1D9E75',traffic:'#EF9F27'};
const OBJ_LABELS={awareness:'Awareness',engagement:'Engagement',leadgen:'Lead Gen',traffic:'Traffic'};
const AD_PALETTE=['#378ADD','#1D9E75','#EF9F27','#D4537E','#7F77DD','#5DCAA5','#185FA5','#0F6E56','#BA7517','#993556','#534AB7','#9FE1CB'];
// ─── State ───────────────────────────────────────────────────────────────────
let activeTab='overview';
let filters={market:'all',owner:'all'};
let periodState={preset:'week',customStart:null,customEnd:null};
let allData=[];
let chartReg={};
let expandedRows={}; // tracks which ad-set rows are expanded: key → bool

// ─── Data loading ─────────────────────────────────────────────────────────────
async function loadData(){
  document.getElementById('period-chip').textContent='Loading…';
  try{
    // Try UTF-8 first
    const res=await fetch('./data.csv');
    if(!res.ok)throw new Error('not found');
    const text=await res.text();
    const parsed=parseLinkedInCSV(text);
    if(parsed.length===0)throw new Error('empty or wrong encoding');
    allData=parsed;
    const lm=res.headers.get('last-modified');
    showUpdatedChip(lm?new Date(lm).toISOString():null);
    showDashboard();renderCurrentTab();
  }catch(e){
    // Retry as UTF-16LE blob
    try{
      const res2=await fetch('./data.csv');
      if(!res2.ok)throw new Error('not found');
      const buf=await res2.arrayBuffer();
      const text16=new TextDecoder('utf-16le').decode(buf);
      const parsed=parseLinkedInCSV(text16);
      if(parsed.length===0)throw new Error('empty');
      allData=parsed;showUpdatedChip(null);showDashboard();renderCurrentTab();
    }catch(e2){
      document.getElementById('empty-state').style.display='flex';
      document.getElementById('period-chip').textContent='No data';
    }
  }
}

function showUpdatedChip(isoTs){
  const el=document.getElementById('updated-chip');
  if(!isoTs){el.style.display='none';return;}
  el.textContent='Updated '+new Date(isoTs).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  el.style.display='inline-flex';
}

// ─── Date range logic ─────────────────────────────────────────────────────────
function getEffectiveDateRange(){
  if(!allData.length)return{start:null,end:null,prevStart:null,prevEnd:null,deltaLabel:''};
  const sorted=[...allData].map(r=>r.date).sort();
  const earliest=sorted[0];
  const latestDate=sorted[sorted.length-1];
  const latest=new Date(latestDate+'T00:00:00');

  const p=periodState.preset;

  if(p==='week'){
    const monStr=getWeekMon(latestDate);
    const mon=new Date(monStr+'T00:00:00');
    const sun=new Date(mon.getTime()+6*86400000);
    const prevMon=new Date(mon.getTime()-7*86400000);
    const prevSun=new Date(mon.getTime()-86400000);
    return{start:monStr,end:sun.toISOString().slice(0,10),
           prevStart:prevMon.toISOString().slice(0,10),prevEnd:prevSun.toISOString().slice(0,10),
           deltaLabel:'WoW Δ'};
  }
  if(p==='month'){
    const y=latest.getFullYear(),m=latest.getMonth();
    const start=`${y}-${String(m+1).padStart(2,'0')}-01`;
    const prevMonthEnd=new Date(y,m,0);
    const prevMonthStart=new Date(y,m-1,1);
    return{start,end:latestDate,
           prevStart:prevMonthStart.toISOString().slice(0,10),prevEnd:prevMonthEnd.toISOString().slice(0,10),
           deltaLabel:'MoM Δ'};
  }
  if(p==='3m'){
    const s3=new Date(latest);s3.setMonth(s3.getMonth()-3);
    const startStr=s3.toISOString().slice(0,10);
    const ps=new Date(s3);ps.setMonth(ps.getMonth()-3);
    const pe=new Date(s3.getTime()-86400000);
    return{start:startStr,end:latestDate,
           prevStart:ps.toISOString().slice(0,10),prevEnd:pe.toISOString().slice(0,10),
           deltaLabel:'vs prev 3M'};
  }
  if(p==='all'){
    return{start:earliest,end:latestDate,prevStart:null,prevEnd:null,deltaLabel:''};
  }
  if(p==='custom'){
    const start=periodState.customStart||earliest;
    const end=periodState.customEnd||latestDate;
    const dur=new Date(end+'T00:00:00')-new Date(start+'T00:00:00');
    const pe=new Date(new Date(start+'T00:00:00').getTime()-86400000).toISOString().slice(0,10);
    const ps=new Date(new Date(start+'T00:00:00').getTime()-dur-86400000).toISOString().slice(0,10);
    return{start,end,prevStart:ps,prevEnd:pe,deltaLabel:'vs prev period'};
  }
  return{start:earliest,end:latestDate,prevStart:null,prevEnd:null,deltaLabel:''};
}

function getPeriodChipLabel(dr){
  const p=periodState.preset;
  if(!dr.start)return'No data';
  if(p==='week')return'Week of '+dr.start;
  if(p==='month'){
    const d=new Date(dr.start+'T00:00:00');
    return d.toLocaleString('en-GB',{month:'long',year:'numeric'});
  }
  if(p==='3m'){
    const s=new Date(dr.start+'T00:00:00');
    const e=new Date(dr.end+'T00:00:00');
    return s.toLocaleString('en-GB',{month:'short'})+' – '+e.toLocaleString('en-GB',{month:'short',year:'numeric'});
  }
  if(p==='all')return'All time';
  if(p==='custom')return(dr.start||'?')+' → '+(dr.end||'?');
  return dr.start;
}

// ─── Filter helpers ───────────────────────────────────────────────────────────
function applyMarketOwner(data){
  return data.filter(r=>{
    if(filters.market!=='all'&&r.market!==filters.market)return false;
    if(filters.owner!=='all'&&r.owner!==filters.owner)return false;
    return true;
  });
}

function applyFilters(data){
  const dr=getEffectiveDateRange();
  return applyMarketOwner(data).filter(r=>{
    if(dr.start&&r.date<dr.start)return false;
    if(dr.end&&r.date>dr.end)return false;
    return true;
  });
}

function scopeData(obj){
  let d=obj?allData.filter(r=>r.objective===obj):allData;
  return applyFilters(d);
}

// Data for the previous equivalent period (market/owner filtered but date shifted)
function getPrevData(obj){
  const dr=getEffectiveDateRange();
  if(!dr.prevStart||!dr.prevEnd)return null;
  let d=obj?allData.filter(r=>r.objective===obj):allData;
  d=applyMarketOwner(d);
  return d.filter(r=>r.date>=dr.prevStart&&r.date<=dr.prevEnd);
}

// ─── Aggregation helpers ──────────────────────────────────────────────────────
function sumAll(data,m){return data.reduce((s,r)=>s+(r[m]||0),0);}
function avgAll(data,m){if(!data.length)return 0;return data.reduce((s,r)=>s+(r[m]||0),0)/data.length;}

// Weekly helpers (for charts only)
function getWeekMon(d){const dt=new Date(d+'T00:00:00');const day=dt.getDay();const mon=new Date(dt);mon.setDate(dt.getDate()-((day+6)%7));return mon.toISOString().slice(0,10);}
function getWeeks(data){return[...new Set(data.map(r=>getWeekMon(r.date)))].sort();}
function sumWk(data,wk,m){return data.filter(r=>getWeekMon(r.date)===wk).reduce((s,r)=>s+(r[m]||0),0);}
function avgWk(data,wk,m){const rows=data.filter(r=>getWeekMon(r.date)===wk);if(!rows.length)return 0;return rows.reduce((s,r)=>s+(r[m]||0),0)/rows.length;}

function wowD(c,p){if(p===null||p===undefined||p===0)return null;return(c-p)/Math.abs(p)*100;}

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmtD(d,inv){
  if(d===null)return'<span class="dneu">—</span>';
  const pos=inv?d<-1:d>1;const neg=inv?d>1:d<-1;
  const cls=pos?'dpos':neg?'dneg':'dneu';const sign=d>0?'+':'';
  return`<span class="${cls}">${sign}${d.toFixed(1)}%</span>`;
}
function fmtDT(d,inv){
  if(d===null)return'<span class="wow-neu">—</span>';
  const pos=inv?d<-1:d>1;const neg=inv?d>1:d<-1;
  const cls=pos?'wow-up':neg?'wow-dn':'wow-neu';const sign=d>0?'+':'';
  return`<span class="${cls}">${sign}${d.toFixed(1)}%</span>`;
}
function mktB(m){const cls={uki:'b-uki',dach:'b-dach',us:'b-us',nordics:'b-nordics'}[m]||'b-bull';return`<span class="badge ${cls}">${m.toUpperCase()}</span>`;}
function ownerB(o){return`<span class="badge ${o==='growth'?'b-growth':'b-bull'}">${o==='growth'?'Growth':'Bulldozer'}</span>`;}
function shortAS(s){return s.replace('[Bulldozer] ','').replace('[Growth PPC] ','').replace('Engagement - ','').replace(' - Engagement','').replace('ABM ','').replace('TOF - ','').replace('MOF - ','');}

function kpiCard(label,val,d,fmt,inv){
  let fv='—';
  if(val!==null&&val!==undefined){
    if(fmt==='eur')fv='€'+Math.round(val).toLocaleString();
    else if(fmt==='pct')fv=val.toFixed(2)+'%';
    else if(fmt==='eur1')fv='€'+val.toFixed(1);
    else if(fmt==='eur2')fv='€'+val.toFixed(2);
    else fv=Math.round(val).toLocaleString();
  }
  const dr=getEffectiveDateRange();
  const dLabel=dr.deltaLabel?`<span style="font-size:9px;color:#aaa;margin-left:3px">${dr.deltaLabel}</span>`:'';
  return`<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${fv}</div><div class="kpi-delta">${fmtD(d,inv||false)}${d!==null?dLabel:''}</div></div>`;
}

// ─── Chart helper ─────────────────────────────────────────────────────────────
function mkChart(id,cfg){
  if(chartReg[id]){chartReg[id].destroy();delete chartReg[id];}
  const el=document.getElementById(id);if(!el)return;
  chartReg[id]=new Chart(el,cfg);
}

// ─── OVERVIEW ─────────────────────────────────────────────────────────────────
function renderOverview(){
  const data=scopeData(null);
  const prevData=getPrevData(null);
  const dr=getEffectiveDateRange();
  const weeks=getWeeks(data);
  const wL=weeks.map(w=>w.slice(5));
  document.getElementById('period-chip').textContent=getPeriodChipLabel(dr);

  const spend=sumAll(data,'spend'),spendP=prevData?sumAll(prevData,'spend'):null;
  const imp=sumAll(data,'impressions'),impP=prevData?sumAll(prevData,'impressions'):null;
  const eng=sumAll(data,'engagements'),engP=prevData?sumAll(prevData,'engagements'):null;
  const leads=sumAll(data,'leads'),leadsP=prevData?sumAll(prevData,'leads'):null;

  const objs=['awareness','engagement','leadgen','traffic'];
  const mkts=['uki','dach','us','nordics'];

  document.getElementById('tab-overview').innerHTML=`
  <div class="kpi-grid">
    ${kpiCard('Total spend',spend,wowD(spend,spendP),'eur')}
    ${kpiCard('Impressions',imp,wowD(imp,impP))}
    ${kpiCard('Engagements',eng,wowD(eng,engP))}
    ${kpiCard('Leads',leads,wowD(leads,leadsP))}
  </div>
  <div class="two-col">
    <div class="card no-mb">
      <div class="ct">Weekly spend by objective (€)</div>
      <div class="leg">${objs.map(o=>`<span class="li"><span class="ld" style="background:${OBJCOLORS[o]}"></span>${OBJ_LABELS[o]}</span>`).join('')}</div>
      <div style="position:relative;height:190px"><canvas id="ov-obj"></canvas></div>
    </div>
    <div class="card no-mb">
      <div class="ct">Weekly spend by market (€)</div>
      <div class="leg">${mkts.map(m=>`<span class="li"><span class="ld" style="background:${MKTCOLORS[m]}"></span>${m.toUpperCase()}</span>`).join('')}</div>
      <div style="position:relative;height:190px"><canvas id="ov-mkt"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="ct">Period spend — Growth PPC vs Bulldozer</div>
    <div style="position:relative;height:80px"><canvas id="ov-own"></canvas></div>
  </div>
  <div class="sec-div">Campaign period summary</div>
  <table><thead><tr>
    <th>Campaign</th><th>Objective</th><th>Owner</th><th>Market</th>
    <th style="text-align:right">Period spend</th><th style="text-align:right">Δ</th>

  function gv(d){if(!d.length)return null;return isAvg?d.reduce((s,r)=>s+r[sm],0)/d.length:d.reduce((s,r)=>s+r[sm],0);}
  function fv(v){if(v===null)return'—';if(['cpl','spend'].includes(sm))return'€'+v.toFixed(1);if(sm==='leadFormCR')return v.toFixed(2)+'%';return Math.round(v).toLocaleString();}
  document.getElementById('lg-tbl').innerHTML=adsets.map((a,idx)=>{
    const ad=data.filter(r=>r.adSet===a);const adP=prevData?prevData.filter(r=>r.adSet===a):null;

    const c=gv(ad);const pp=adP&&adP.length?gv(adP):null;
    const key=`lg_${idx}`;const isExp=!!expandedRows[key];
    const hls=[...new Set(ad.map(r=>r.adHeadline||r.adName).filter(Boolean))];const hasAds=hls.length>0;
    let html=`<tr onclick="toggleExpand('${key}')" style="${hasAds?'cursor:pointer':''}"><td><span class="expand-icon${isExp?' open':''}">${hasAds?'▶':''}</span> ${shortAS(a)}</td><td>${mktB(mkt)}</td><td>${ownerB(ow)}</td><td style="text-align:right;font-weight:600">${fv(c)}</td><td style="text-align:right;color:#888780">${fv(pp)}</td><td style="text-align:right">${fmtDT(wowD(c,pp),inv)}</td></tr>`;
    if(isExp&&hasAds){hls.forEach(hl=>{const hd=ad.filter(r=>(r.adHeadline||r.adName)===hl);const hp=adP?adP.filter(r=>(r.adHeadline||r.adName)===hl):null;const hc=gv(hd);const hpv=hp&&hp.length?gv(hp):null;const sh=hl.length>55?hl.slice(0,52)+'…':hl;html+=`<tr class="ad-row"><td style="padding-left:28px;color:#5f5e5a;font-size:10px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${hl.replace(/"/g,'&quot;')}">${sh}</td><td></td><td></td><td style="text-align:right">${fv(hc)}</td><td style="text-align:right;color:#aaa">${fv(hpv)}</td><td style="text-align:right">${fmtDT(wowD(hc,hpv),inv)}</td></tr>`;});}
    return html;
  }).join('');
}

// ─── Routing ──────────────────────────────────────────────────────────────────
function toggleExpand(key){
  expandedRows[key]=!expandedRows[key];
  renderCurrentTab();
}

function switchTab(tab,el){
  activeTab=tab;
  expandedRows={};
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderCurrentTab();
}

function setFilter(type,val,el){
  filters[type]=val;
  document.querySelectorAll(`.pill[onclick*="'${type}'"]`).forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  renderCurrentTab();
}

function setPeriod(preset,el){
  periodState.preset=preset;
  document.querySelectorAll('[id^="period-"]').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  const customRow=document.getElementById('custom-date-row');
  customRow.style.display=preset==='custom'?'flex':'none';
  if(preset==='custom'){
    // Pre-fill dates with data range if not set
    if(!periodState.customStart&&allData.length){
      const sorted=allData.map(r=>r.date).sort();
      const startEl=document.getElementById('date-start');
      const endEl=document.getElementById('date-end');
      if(!startEl.value)startEl.value=sorted[0];
      if(!endEl.value)endEl.value=sorted[sorted.length-1];
      periodState.customStart=startEl.value;
      periodState.customEnd=endEl.value;
    }
  }
  renderCurrentTab();
}

function updateCustomDates(){
  periodState.customStart=document.getElementById('date-start').value;
  periodState.customEnd=document.getElementById('date-end').value;
  if(periodState.customStart&&periodState.customEnd)renderCurrentTab();
}

function renderCurrentTab(){
  if(!allData.length)return;
  if(activeTab==='overview')renderOverview();
  else if(activeTab==='awareness')renderAwareness();
  else if(activeTab==='engagement')renderEngagement();
  else if(activeTab==='leadgen')renderLeadGen();
  else if(activeTab==='traffic')renderTraffic();
}

// ─── CSV Parser ───────────────────────────────────────────────────────────────
function handleCSV(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=parseLinkedInCSV(e.target.result);
      if(parsed.length>0){
        allData=parsed;
        saveToStorage(parsed);
        showUpdatedChip(new Date().toISOString());
        showDashboard();
        renderCurrentTab();
      }else{alert('No data found. Make sure this is a LinkedIn Ad Set Performance export at account level.');}
    }catch(err){alert('Could not parse CSV: '+err.message);}
  };
  reader.readAsText(file,'UTF-16LE');
}

function parseLinkedInCSV(text){
  const lines=text.split('\n');
  let hdrIdx=-1;
  for(let i=0;i<Math.min(lines.length,10);i++){if(lines[i].includes('Start Date')&&lines[i].includes('Campaign Name')){hdrIdx=i;break;}}
  if(hdrIdx<0)throw new Error('Header row not found');
  const headers=lines[hdrIdx].split('\t').map(h=>h.trim().replace(/^"|"$/g,'').replace(/^﻿/,''));
  const gi=n=>headers.indexOf(n);
  const rows=[];
  for(let i=hdrIdx+1;i<lines.length;i++){
    const cols=lines[i].split('\t').map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<10||!cols[0])continue;
    const toF=s=>{const n=parseFloat(s.replace('%','').replace(',','').replace(/\s/g,''));return isNaN(n)?0:n;};
    const dateRaw=cols[0];let dateIso=dateRaw;
    const m=dateRaw.match(/(\d+)\/(\d+)\/(\d+)/);
    if(m){const yr=m[3].length===2?'20'+m[3]:m[3];dateIso=`${yr}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;}
    // Support both old (ad-set level) and new (ad level) export formats
    const camName=(gi('Campaign Name')>=0?cols[gi('Campaign Name')]:cols[4])||'';
    const adSet=(gi('Ad Set Name')>=0?cols[gi('Ad Set Name')]:(gi('Ad set Name')>=0?cols[gi('Ad set Name')]:cols[8]))||'';
    const adName=(gi('Ad Name')>=0?cols[gi('Ad Name')]||'':'');
    const adHeadline=(gi('Ad Headline')>=0?cols[gi('Ad Headline')]||'':'');
    // Objective: prefer explicit 'Ad Set Objective', fall back to 'Campaign Objective Type', then positional
    const objIdx=gi('Ad Set Objective')>=0?gi('Ad Set Objective'):(gi('Campaign Objective Type')>=0?gi('Campaign Objective Type'):-1);
    const objRaw=(objIdx>=0?cols[objIdx]||'':cols[7]||'').toLowerCase();
    let obj='other';
    if(objRaw.includes('awareness')||objRaw.includes('brand'))obj='awareness';
    else if(objRaw.includes('engagement'))obj='engagement';
    else if(objRaw.includes('lead'))obj='leadgen';
    else if(objRaw.includes('visit')||objRaw.includes('traffic')||objRaw.includes('website'))obj='traffic';
    const owner=(camName+adSet).toLowerCase().includes('bulldozer')?'bulldozer':'growth';
    const nameU=(camName+' '+adSet).toUpperCase();
    let market='other';
    if(owner==='bulldozer'){if(nameU.includes('NORDIC'))market='nordics';else if(nameU.includes('US'))market='us';}
    else{if(nameU.includes('DACH'))market='dach';else if(nameU.includes('UKI'))market='uki';else if(nameU.includes('US'))market='us';else if(nameU.includes('NORDIC'))market='nordics';}
    const g=col=>{const idx=gi(col);return idx>=0&&idx<cols.length?toF(cols[idx]):0;};
    rows.push({date:dateIso,campaignName:camName,adSet,adName,adHeadline,objective:obj,owner,market,
      spend:g('Total Spent'),impressions:g('Impressions'),clicks:g('Clicks'),
      ctr:g('Click Through Rate'),cpm:g('Average CPM'),cpc:g('Average CPC'),
      engagements:g('Total Engagements'),engagementRate:g('Engagement Rate'),
      leads:g('Leads'),leadFormsOpened:g('Lead Forms Opened'),
      leadFormCR:g('Lead Form Completion Rate'),cpl:g('Cost per Lead'),
      videoViews:g('Video Views'),videoViewRate:g('Video View Rate'),
      videoViews25:g('Video Views at 25%'),videoViews50:g('Video Views at 50%'),
      videoViews75:g('Video Views at 75%'),videoCompletions:g('Video Completions'),
      videoCompletionRate:g('Video Completion Rate'),
      clicksToLP:g('Clicks to Landing Page'),
      doc25:g('Document Displays at 25%'),doc50:g('Document Displays at 50%'),
      doc75:g('Document Displays at 75%'),doc100:g('Document Displays at 100%')});
  }
  return rows;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function showDashboard(){
  document.getElementById('empty-state').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

loadData();
